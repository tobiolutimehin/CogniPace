version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Group minor and patch updates for non-major packages to reduce noise
      minor-patch-updates:
        update-types:
          - "minor"
          - "patch"
      # Keep major updates individual as they likely require manual migration

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"

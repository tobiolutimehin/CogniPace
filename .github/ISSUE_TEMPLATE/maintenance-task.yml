name: Maintenance task
description: Track non-roadmap repo work such as docs, tests, cleanup, or security hardening.
title: "[Maintenance]: "
labels:
  - maintenance
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Docs and governance
        - Dependency hygiene
        - React UI polish
        - Tests and verification
        - Security hardening
        - Performance cleanup
        - Repo hygiene
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the maintenance work clearly enough that a contributor or agent will not guess scope.
    validations:
      required: true
  - type: checkboxes
    id: layers
    attributes:
      label: Likely layers touched
      options:
        - label: "`src/ui/*`"
        - label: "`src/data/*`"
        - label: "`src/domain/*`"
        - label: "`src/extension/*`"
        - label: "docs only"
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: What checks should pass or what evidence should be attached?
      placeholder: Run npm run check; attach before/after screenshots for popup polish.

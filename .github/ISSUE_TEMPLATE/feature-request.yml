name: Feature request
description: Propose a product change that fits the documented scope.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem is not handled well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you want.
    validations:
      required: true
  - type: checkboxes
    id: surfaces
    attributes:
      label: Affected surfaces
      options:
        - label: Popup
        - label: Dashboard
        - label: Overlay
        - label: Background/runtime
        - label: Import/export
  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How would we know this is complete?
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Related docs
      description: Link the product, feature, or architecture docs that already cover or constrain this request if known.
